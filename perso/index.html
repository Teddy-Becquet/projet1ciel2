<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Alarm System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🚨 Smart Alarm System</h1>
            <div class="connection-status">
                <span class="status-indicator" id="connectionIndicator"></span>
                <span id="connectionText">Déconnecté</span>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- État de l'alarme -->
            <div class="alarm-card">
                <div class="alarm-status" id="alarmStatus">
                    <div class="status-icon" id="statusIcon">🔕</div>
                    <div class="status-text">
                        <h2 id="statusTitle">Alarme Désactivée</h2>
                        <p id="statusSubtitle">L'alarme est actuellement éteinte</p>
                    </div>
                </div>

                <!-- Contrôles -->
                <div class="controls">
                    <button class="btn btn-danger" id="btnOn" onclick="activateAlarm()">
                        <span class="btn-icon">🔊</span>
                        Activer l'alarme
                    </button>
                    <button class="btn btn-success" id="btnOff" onclick="deactivateAlarm()">
                        <span class="btn-icon">🔕</span>
                        Désactiver l'alarme
                    </button>
                </div>
            </div>

            <!-- Informations -->
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">État</div>
                    <div class="info-value" id="infoState">OFF</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Arduino</div>
                    <div class="info-value" id="infoArduino">172.29.19.187</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Dernière MAJ</div>
                    <div class="info-value" id="infoLastUpdate">--:--:--</div>
                </div>
            </div>

            <!-- Historique -->
            <div class="history-card">
                <h3>📝 Historique des événements</h3>
                <div class="history-list" id="historyList">
                    <div class="history-item">
                        <span class="history-time">--:--:--</span>
                        <span class="history-message">En attente de connexion...</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>Projet Client/Server - TP3 SN2 - Arduino Uno + Shield Ethernet</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
